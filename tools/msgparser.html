<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HL7 v2.x Parser</title>
  <link rel="stylesheet" href="theme.css" />
  <script src="theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* Segment colours — darker for light mode readability */
    [data-theme="light"] .seg-name.MSH { color: #1d4ed8; }
    [data-theme="light"] .seg-name.PID { color: #065f46; }
    [data-theme="light"] .seg-name.PV1,
    [data-theme="light"] .seg-name.PV2 { color: #92400e; }
    [data-theme="light"] .seg-name.OBR { color: #78350f; }
    [data-theme="light"] .seg-name.OBX { color: #5b21b6; }
    [data-theme="light"] .seg-name.ORC { color: #9d174d; }
    [data-theme="light"] .seg-name.DG1 { color: #064e3b; }
    [data-theme="light"] .seg-name.NTE { color: #374151; }
    [data-theme="light"] .seg-name.AL1 { color: #92400e; }
    [data-theme="light"] .seg-name.EVN { color: #4c1d95; }
    [data-theme="light"] .seg-name.IN1 { color: #1e40af; }
    [data-theme="light"] .seg-name.NK1 { color: #831843; }
    [data-theme="light"] .seg-name.MRG { color: #78350f; }
    [data-theme="light"] .seg-name.RXO,
    [data-theme="light"] .seg-name.RXE,
    [data-theme="light"] .seg-name.RXA { color: #3f6212; }
    [data-theme="light"] .seg-name.SCH { color: #164e63; }
    [data-theme="light"] .seg-name.SPM { color: #581c87; }
    [data-theme="light"] .seg-name.SAC { color: #312e81; }
    [data-theme="light"] .seg-name.TQ1,
    [data-theme="light"] .seg-name.TQ2 { color: #7c2d12; }

    /* Light mode inline colour overrides */
    [data-theme="light"] .comp-label { color: #6d28d9; }
    [data-theme="light"] .raw-seg-tag { color: #1d4ed8; font-weight: 700; }
    [data-theme="light"] .raw-sep { color: var(--muted); }
    [data-theme="light"] .raw-comp-sep { color: #6d28d9; }
    [data-theme="light"] .raw-rep-sep { color: #b45309; }
    [data-theme="light"] .raw-sub-sep { color: #c2410c; }
    [data-theme="light"] .field-value.empty { color: var(--muted); }
    [data-theme="light"] .rep-header { color: #92400e; }
    [data-theme="light"] .error-panel { background: #fef2f2; border-color: #fca5a5; color: #dc2626; }

    .sample-split {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color .15s;
    }

    .sample-split:hover { border-color: var(--muted); }
    .sample-split:focus-within { border-color: var(--accent); }

    .sample-split .btn-ghost {
      border-radius: 0;
      border: none;
      border-right: 1px solid var(--border);
      height: 28px;
    }

    .sample-split .btn-ghost:hover { border-color: transparent; }

    .sample-split .select-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .sample-split select {
      appearance: none;
      background: var(--surface2);
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
      padding: 0 22px 0 6px;
      height: 28px;
      cursor: pointer;
      outline: none;
      transition: color .15s, background .15s;
    }

    .sample-split select:hover { color: var(--text); }

    .sample-split .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 5px;
      font-size: 10px;
      color: var(--muted);
      pointer-events: none;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header h1 {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header .badge {
      background: var(--accent2);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    header .spacer { flex: 1; }

    header .hint {
      color: var(--muted);
      font-size: 12px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      flex: 1;
      min-height: 0;
    }

    .panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel:last-child { border-right: none; }

    .panel-header {
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
    }

    .panel-header .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .panel-header .actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    button {
      cursor: pointer;
      border: none;
      font-family: inherit;
    }








    .btn-parse {
      width: 100%;
      height: 36px;
      padding: 0 16px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      letter-spacing: 0.4px;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
      transition: background .15s, box-shadow .15s, transform .1s;
    }

    .btn-parse:hover { background: var(--accent); box-shadow: 0 3px 10px rgba(var(--accent-rgb),.4); }
    .btn-parse:active { transform: scale(0.99); box-shadow: none; }

    textarea {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      tab-size: 2;
    }

    textarea::placeholder { color: var(--muted); }

    .input-actions {
      padding: 10px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .input-actions .spacer { flex: 1; }

    .msg-type-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 4px;
      font-weight: 700;
      font-family: var(--font-mono);
    }

    /* Structured layout — SmartHL7-style sidebar + flat table */
    .structured-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .seg-nav {
      width: 90px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      background: var(--surface);
      padding: 6px 0;
      display: flex;
      flex-direction: column;
    }

    .seg-nav-item {
      padding: 4px 6px 4px 10px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      color: var(--muted);
      border-left: 2px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: baseline;
      gap: 2px;
      transition: color .1s, background .1s;
      user-select: none;
    }

    .seg-nav-item:hover { color: var(--text); background: var(--surface2); }
    .seg-nav-item.nav-active { border-left-color: var(--accent); background: var(--surface2); }

    .seg-nav-badge {
      font-size: 9px;
      color: var(--muted);
      font-family: var(--font-sans);
      font-weight: 400;
      flex-shrink: 0;
    }

    /* Table scroll area */
    .seg-table-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    .empty-state .icon { font-size: 48px; opacity: .4; }
    .empty-state p { font-size: 13px; line-height: 1.5; }

    /* Segment block */
    .seg-block {
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .seg-block-header {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .seg-block-header:hover { filter: brightness(1.07); }
    [data-theme="light"] .seg-block-header:hover { filter: brightness(0.96); }
    .seg-block.collapsed .seg-chevron { transform: rotate(-90deg); }
    .seg-block.collapsed .seg-tbl-body { display: none; }

    .seg-name {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      min-width: 36px;
    }

    .seg-desc {
      font-size: 11px;
      color: var(--muted);
      flex: 1;
    }

    .seg-count {
      font-size: 10px;
      color: var(--muted);
      background: var(--bg);
      padding: 1px 6px;
      border-radius: 10px;
    }

    .seg-chevron {
      font-size: 10px;
      color: var(--muted);
      transition: transform .15s;
    }

    /* Flat field table */
    .seg-tbl {
      width: 100%;
      border-collapse: collapse;
    }

    .seg-tbl tr { border-bottom: 1px solid var(--border); }
    .seg-tbl tr:last-child { border-bottom: none; }
    .seg-tbl tr:hover td { background: var(--surface2); }

    .seg-tbl td {
      padding: 4px 10px;
      vertical-align: top;
    }

    .tbl-fid {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      width: 60px;
    }

    .tbl-fname {
      font-size: 11px;
      color: var(--muted);
      width: 170px;
    }

    .tbl-fval {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      word-break: break-all;
    }

    .tbl-fval.empty {
      color: var(--muted);
      font-style: italic;
      opacity: .4;
      font-size: 11px;
      font-family: var(--font-sans);
    }

    /* Component / repetition breakdown */
    .comp-list {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .comp-item {
      display: flex;
      gap: 8px;
      align-items: baseline;
      padding: 2px 0 2px 8px;
      border-left: 2px solid var(--border);
    }

    .comp-label {
      font-size: 10px;
      color: var(--accent2);
      min-width: 52px;
      font-family: var(--font-mono);
      flex-shrink: 0;
    }

    .comp-val {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text);
      opacity: .85;
      word-break: break-all;
    }

    .rep-block { margin-top: 3px; }

    .rep-header {
      font-size: 10px;
      color: var(--yellow);
      font-family: var(--font-mono);
      margin-bottom: 2px;
    }

    /* Message summary bar */
    .msg-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .summary-item { display: flex; flex-direction: column; gap: 2px; }

    .summary-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    .summary-value {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
    }

    .summary-value.green { color: var(--green); }
    .summary-value.accent { color: var(--accent); }
    .summary-value.yellow { color: var(--yellow); }
    .summary-value.orange { color: var(--orange); }

    /* Error panel */
    .error-panel {
      background: rgba(var(--red-rgb),0.12);
      border: 1px solid rgba(var(--red-rgb),0.3);
      border-radius: var(--radius);
      padding: 12px 14px;
      color: var(--red);
      font-size: 13px;
      font-family: var(--font-mono);
    }

    /* Segment color coding */
    .seg-name.MSH { color: var(--accent); }
    .seg-name.PID { color: var(--green); }
    .seg-name.PV1, .seg-name.PV2 { color: var(--orange); }
    .seg-name.OBR { color: var(--yellow); }
    .seg-name.OBX { color: var(--accent2); }
    .seg-name.ORC { color: var(--red); }
    .seg-name.DG1 { color: var(--green); }
    .seg-name.NTE { color: var(--muted); }
    .seg-name.AL1 { color: var(--orange); }
    .seg-name.EVN { color: var(--accent2); }
    .seg-name.IN1 { color: var(--accent); }
    .seg-name.NK1 { color: var(--red); }
    .seg-name.MRG { color: var(--yellow); }
    .seg-name.RXO, .seg-name.RXE, .seg-name.RXA { color: var(--green); }
    .seg-name.SCH { color: var(--accent); }
    .seg-name.SPM { color: var(--accent2); }
    .seg-name.SAC { color: var(--accent2); }
    .seg-name.TQ1, .seg-name.TQ2 { color: var(--orange); }

    /* Tabs for output */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .tab {
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .15s;
      background: none;
      letter-spacing: 0.3px;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; flex: 1; overflow: hidden; }
    .tab-content.active { display: flex; flex-direction: column; overflow: hidden; }

    /* Raw view */
    .raw-view {
      flex: 1;
      overflow: auto;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.8;
    }

    .raw-segment-line {
      display: flex;
      gap: 0;
      flex-wrap: wrap;
    }

    .raw-seg-tag {
      color: var(--accent);
      font-weight: 700;
    }

    .raw-sep { color: var(--border); }
    .raw-field { color: var(--text); }
    .raw-comp-sep { color: var(--accent2); }
    .raw-rep-sep { color: var(--yellow); }
    .raw-sub-sep { color: var(--orange); }

    /* JSON view */
    .json-view {
      flex: 1;
      overflow: auto;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }

    /* Stats row */
    .stats-row {
      padding: 6px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 16px;
      font-size: 11px;
      color: var(--muted);
    }

    .stats-row span b { color: var(--text); }

    @media (max-width: 900px) {
      .main-grid {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }
      .panel { border-right: none; border-bottom: 1px solid var(--border); }
    }

    /* ── FHIR Panel ─────────────────────────────────────────────────────────── */
    #fhir-panel {
      width: 100%;
      padding: 20px 24px 32px;
      display: none;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      background: var(--bg);
    }

    .fhir-header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .fhir-badge {
      background: var(--accent);
      color: var(--bg);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      padding: 3px 11px;
      border-radius: 20px;
      letter-spacing: 0.2px;
    }

    .fhir-header-id {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }
    .fhir-header-id strong { color: var(--text); }

    .fhir-header-date {
      font-size: 12px;
      color: var(--muted);
    }

    .fhir-version-label {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: var(--accent2);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .fhir-section-title {
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .fhir-section {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .fhir-section-body {
      padding: 14px;
      background: var(--bg);
    }

    .fhir-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    @media (max-width: 900px) {
      .fhir-cards { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .fhir-cards { grid-template-columns: 1fr; }
    }

    .fhir-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .fhir-card .card-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
    }

    .fhir-card .card-value {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text);
      word-break: break-word;
      line-height: 1.5;
    }

    .fhir-empty {
      color: var(--muted);
      font-style: italic;
      font-size: 12px;
    }

    .fhir-id-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .fhir-id-table th {
      text-align: left;
      padding: 5px 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .fhir-id-table td {
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      color: var(--text);
      vertical-align: top;
    }

    .fhir-id-table tr:last-child td { border-bottom: none; }
    .fhir-id-table tr:hover td { background: var(--surface2); }

    .fhir-id-system {
      color: var(--muted);
      font-size: 11px;
    }

    .fhir-raw details {
      background: var(--surface);
    }

    .fhir-raw summary {
      padding: 9px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .fhir-raw summary::-webkit-details-marker { display: none; }

    .fhir-raw summary::before {
      content: '▸';
      font-size: 10px;
    }

    .fhir-raw details[open] summary::before { content: '▾'; }

    .fhir-raw pre {
      margin: 0;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.6;
      overflow-x: auto;
      background: var(--bg);
      border-top: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-all;
    }

    .fhir-scalar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
      padding: 14px;
    }
  </style>
</head>
<body>

<header class="app-header">
  <h1>HL7 Parser</h1>
  <span class="badge">v2.x</span>
  <span class="spacer"></span>
  <span class="hint">Paste an HL7 message to begin</span>
  <div class="nav-links">
    <a href="dicom-viewer.html">DICOM Viewer</a>
    <a href="dicom-generator.html">DICOM Gen</a>
    <a href="diff-checker.html">Diff Checker</a>
    <a href="mwl-simulator.html">MWL Sim</a>
    <a href="dicom-hl7-order.html">DICOM→HL7</a>
  </div>
  <button class="btn-theme" id="btn-theme">
    <span class="theme-icon">☀️</span>
    <span class="theme-label">Light</span>
  </button>
</header>

<div class="main-grid">
  <!-- LEFT: Input -->
  <div class="panel" style="grid-row: 1 / 3;">
    <div class="panel-header">

// ─── HL7 Parser ──────────────────────────────────────────────────────────────
function parseHL7(text) {
  // Normalize line endings; HL7 uses \r, but editors may use \n or \r\n
  const raw = text.trim().replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = raw.split('\n').filter(l => l.trim() !== '');

  if (!lines.length) throw new Error('Empty message');

  // Find MSH line
  const mshLine = lines.find(l => l.startsWith('MSH'));
  if (!mshLine) throw new Error('No MSH segment found');

  const fieldSep = mshLine[3];
  const encChars = mshLine[4] === fieldSep ? '' : mshLine.split(fieldSep)[1];
  const compSep = encChars[0] || '^';
  const repSep = encChars[1] || '~';
  const escChar = encChars[2] || '\\';
  const subSep = encChars[3] || '&';

  const delimiters = { fieldSep, compSep, repSep, escChar, subSep };

  const segments = [];
  for (const line of lines) {
    const segName = line.substring(0, 3);
    const splitFields = line.split(fieldSep);

    // MSH.1 is the field separator (|) itself — it is consumed by split() and absent
    // from the result. Insert it synthetically so fields[N] === MSH.N for N >= 1.
    const fields = (segName === 'MSH')
      ? [splitFields[0], fieldSep, ...splitFields.slice(1)]
      : splitFields;

    const parsedFields = fields.map((rawField, fi) => {
      if (segName === 'MSH' && (fi === 1 || fi === 2)) {
        // MSH.1 = field separator, MSH.2 = encoding chars — treat both as literals
        return { raw: rawField, repetitions: [{ raw: rawField, components: [{ raw: rawField, subcomponents: [rawField] }] }] };
      }
      return parseField(rawField, delimiters);
    });

    const def = SEG_DEFS[segName] || getZSegDef(segName);
    segments.push({ name: segName, fields: parsedFields, def, raw: line });
  }

  // Extract message summary
  const msh = segments.find(s => s.name === 'MSH');
  const summary = {};
  if (msh) {
    summary.msgType = getFieldVal(msh, 9);   // MSH.9
    summary.msgCtrlId = getFieldVal(msh, 10); // MSH.10
    summary.sendingApp = getFieldVal(msh, 3); // MSH.3
    summary.receivingApp = getFieldVal(msh, 5); // MSH.5
    summary.datetime = getFieldVal(msh, 7);   // MSH.7
    summary.version = getFieldVal(msh, 12);   // MSH.12
    summary.processingId = getFieldVal(msh, 11); // MSH.11
  }

  return { segments, delimiters, summary };
}

function getZSegDef(name) {
  if (name.startsWith('Z')) {
    return { desc: `Custom Z-Segment (${name})`, fields: [] };
  }
  return { desc: 'Unknown Segment', fields: [] };
}

function parseField(rawField, d) {
  const reps = rawField.split(d.repSep);
  const repetitions = reps.map(rep => {
    const comps = rep.split(d.compSep);
    const components = comps.map(comp => {
      const subs = comp.split(d.subSep);
      return { raw: comp, subcomponents: subs };
    });
    return { raw: rep, components };
  });
  return { raw: rawField, repetitions };
}

function getFieldVal(seg, idx) {
  const f = seg.fields[idx];
  if (!f) return '';
  return f.raw || '';
}

// ─── Rendering ───────────────────────────────────────────────────────────────
function renderStructured(parsed) {
  const { segments, summary } = parsed;
  const container = document.getElementById('output-structured');
  const navEl = document.getElementById('seg-nav');
  container.innerHTML = '';
  navEl.innerHTML = '';

  // Summary bar
  const msgTypeLabel = MSG_TYPES[summary.msgType] || MSG_TYPES[summary.msgType?.split('^')[0]] || summary.msgType || 'Unknown';
  const bar = document.createElement('div');
  bar.className = 'msg-summary';
  bar.innerHTML = `
    <div class="summary-item">
      <span class="summary-label">Message Type</span>
      <span class="summary-value accent">${esc(summary.msgType || '—')}</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Description</span>
      <span class="summary-value" style="color:var(--text)">${esc(msgTypeLabel)}</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Version</span>
      <span class="summary-value yellow">${esc(summary.version || '—')}</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Ctrl ID</span>
      <span class="summary-value green">${esc(summary.msgCtrlId || '—')}</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Sending App</span>
      <span class="summary-value orange">${esc(summary.sendingApp || '—')}</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Receiving App</span>
      <span class="summary-value orange">${esc(summary.receivingApp || '—')}</span>
    </div>
    <div class="summary-item">
      <span class="summary-label">Segments</span>
      <span class="summary-value green">${segments.length}</span>
    </div>
  `;
  container.appendChild(bar);

  // Build nav items and segment tables
  const seenOcc = {};
  const navItems = [];

  for (const seg of segments) {
    seenOcc[seg.name] = (seenOcc[seg.name] || 0) + 1;
    const segIdx = seenOcc[seg.name];
    const blockId = `seg-${seg.name}-${segIdx}`;

    // Nav item
    const navItem = document.createElement('div');
    navItem.className = 'seg-nav-item';
    navItem.dataset.target = blockId;
    const nameSpan = document.createElement('span');
    nameSpan.className = `seg-name ${esc(seg.name)}`;
    nameSpan.textContent = seg.name;
    navItem.appendChild(nameSpan);
    if (segIdx > 1) {
      const badge = document.createElement('span');
      badge.className = 'seg-nav-badge';
      badge.textContent = `[${segIdx}]`;
      navItem.appendChild(badge);
    }
    navItem.addEventListener('click', () => {
      navItems.forEach(n => n.classList.remove('nav-active'));
      navItem.classList.add('nav-active');
      const target = document.getElementById(blockId);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
    navEl.appendChild(navItem);
    navItems.push(navItem);

    // Segment block (flat table)
    container.appendChild(buildSegTable(seg, parsed.delimiters, blockId));
  }

  // Scroll spy: keep nav in sync with visible content.
  // Assigned via onscroll so re-parsing replaces the handler instead of stacking listeners.
  container.onscroll = () => {
    const wrapTop = container.getBoundingClientRect().top;
    let activeIdx = 0;
    for (let i = 0; i < navItems.length; i++) {
      const el = document.getElementById(navItems[i].dataset.target);
      if (el && el.getBoundingClientRect().top - wrapTop <= 10) activeIdx = i;
    }
    navItems.forEach((n, i) => n.classList.toggle('nav-active', i === activeIdx));
  };
}

function buildSegTable(seg, delimiters, blockId) {
  const block = document.createElement('div');
  block.className = 'seg-block';
  block.id = blockId;

  // Header
  const header = document.createElement('div');
  header.className = 'seg-block-header';
  const nonEmpty = seg.fields.slice(1).filter(f => f && f.raw !== '').length;
  header.innerHTML = `
    <span class="seg-name ${esc(seg.name)}">${esc(seg.name)}</span>
    <span class="seg-desc">${esc(seg.def?.desc || 'Unknown')}</span>
    <span class="seg-count">${nonEmpty} / ${seg.fields.length - 1} field${seg.fields.length !== 2 ? 's' : ''}</span>
    <span class="seg-chevron">▾</span>
  `;
  header.addEventListener('click', () => block.classList.toggle('collapsed'));
  block.appendChild(header);

  // Collapsible table body
  const tbody = document.createElement('div');
  tbody.className = 'seg-tbl-body';
  const table = document.createElement('table');
  table.className = 'seg-tbl';

  const fieldNames = seg.def?.fields || [];
  for (let i = 1; i < seg.fields.length; i++) {
    const field = seg.fields[i];
    const nameLabel = fieldNames[i - 1] || '';
    const isMshSep = seg.name === 'MSH' && i === 1;
    const isEmpty = !field || field.raw === '';

    const tr = document.createElement('tr');

    const tdId = document.createElement('td');
    tdId.className = 'tbl-fid';
    tdId.textContent = `${seg.name}.${i}`;

    const tdName = document.createElement('td');
    tdName.className = 'tbl-fname';
    tdName.textContent = nameLabel;

    const tdVal = document.createElement('td');
    tdVal.className = 'tbl-fval';

    if (isEmpty) {
      tdVal.classList.add('empty');
      tdVal.textContent = '—';
    } else if (isMshSep) {
      tdVal.textContent = field.raw;
    } else {
      const reps = field.repetitions;
      const hasReps = reps.length > 1;
      const hasComps = reps.some(r => r.components.length > 1);
      const hasSubs = reps.some(r => r.components.some(c => c.subcomponents.length > 1));

      if (!hasComps && !hasSubs && !hasReps) {
        tdVal.textContent = field.raw;
      } else {
        const rawDiv = document.createElement('div');
        rawDiv.textContent = field.raw;
        rawDiv.style.marginBottom = '4px';
        tdVal.appendChild(rawDiv);

        const detail = document.createElement('div');
        detail.className = 'comp-list';

        reps.forEach((rep, ri) => {
          if (hasReps) {
            const rh = document.createElement('div');
            rh.className = 'rep-header';
            rh.textContent = `↻ Rep ${ri + 1}`;
            detail.appendChild(rh);
          }
          rep.components.forEach((comp, ci) => {
            const ci1 = ci + 1;
            if (comp.subcomponents.length > 1) {
              comp.subcomponents.forEach((sub, si) => {
                const item = document.createElement('div');
                item.className = 'comp-item';
                item.innerHTML = `<span class="comp-label">.${ci1}.${si + 1}</span><span class="comp-val">${esc(sub)}</span>`;
                detail.appendChild(item);
              });
            } else {
              const item = document.createElement('div');
              item.className = 'comp-item';
              item.innerHTML = `<span class="comp-label">.${ci1}</span><span class="comp-val">${esc(comp.raw)}</span>`;
              detail.appendChild(item);
            }
          });
        });
        tdVal.appendChild(detail);
      }
    }

    tr.appendChild(tdId);
    tr.appendChild(tdName);
    tr.appendChild(tdVal);
    table.appendChild(tr);
  }

  tbody.appendChild(table);
  block.appendChild(tbody);
  return block;
}

function renderHighlighted(parsed) {
  const { segments, delimiters } = parsed;
  const { fieldSep, compSep, repSep, subSep } = delimiters;
  const container = document.getElementById('output-raw');
  container.innerHTML = '';

  for (const seg of segments) {
    const line = document.createElement('div');
    line.className = 'raw-segment-line';
    line.style.marginBottom = '4px';

    const parts = seg.raw.split(fieldSep);
    parts.forEach((part, pi) => {
      if (pi > 0) {
        const sep = document.createElement('span');
        sep.className = 'raw-sep';
        sep.textContent = fieldSep;
        line.appendChild(sep);
      }
      const span = document.createElement('span');
      if (pi === 0) {
        span.className = `raw-seg-tag seg-name ${esc(seg.name)}`;
        span.textContent = part;
      } else {
        // Color sub-delimiters
        const inner = colorizeField(part, compSep, repSep, subSep);
        span.className = 'raw-field';
        span.innerHTML = inner;
      }
      line.appendChild(span);
    });

    container.appendChild(line);
  }
}

function colorizeField(text, compSep, repSep, subSep) {
  let result = '';
  for (const ch of text) {
    if (ch === compSep) result += `<span class="raw-comp-sep">${esc(ch)}</span>`;
    else if (ch === repSep) result += `<span class="raw-rep-sep">${esc(ch)}</span>`;
    else if (ch === subSep) result += `<span class="raw-sub-sep">${esc(ch)}</span>`;
    else result += esc(ch);
  }
  return result;
}

function renderJSON(parsed) {
  const { segments, delimiters, summary } = parsed;
  const container = document.getElementById('output-json');

  const obj = {
    summary,
    delimiters,
    segments: segments.map(seg => {
      const fields = {};
      const fieldNames = seg.def?.fields || [];
      seg.fields.forEach((f, i) => {
        if (i === 0) return; // skip segment name
        const key = fieldNames[i - 1]
          ? `${seg.name}.${i} - ${fieldNames[i - 1]}`
          : `${seg.name}.${i}`;
        if (f.raw === '') {
          fields[key] = null;
        } else if (f.repetitions.length === 1 && f.repetitions[0].components.length === 1 && f.repetitions[0].components[0].subcomponents.length === 1) {
          fields[key] = f.raw;
        } else {
          fields[key] = f.repetitions.map(rep => {
            if (rep.components.length === 1 && rep.components[0].subcomponents.length === 1) return rep.raw;
            return rep.components.map(comp => {
              if (comp.subcomponents.length === 1) return comp.raw;
              return comp.subcomponents;
            });
          });
          if (fields[key].length === 1) fields[key] = fields[key][0];
        }
      });
      return { segment: seg.name, description: seg.def?.desc, fields };
    })
  };

  container.textContent = JSON.stringify(obj, null, 2);
  // Syntax highlight JSON
  container.innerHTML = syntaxHighlightJSON(container.textContent);
}

function syntaxHighlightJSON(json) {
  // Message values may contain HTML — escape every emitted piece so nothing injects markup.
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)|[<>&]/g, match => {
    if (match === '<' || match === '>' || match === '&') return esc(match);
    let cls = 'color:var(--text)';
    if (/^"/.test(match)) {
      if (/:$/.test(match)) cls = 'color:var(--accent)';
      else cls = 'color:var(--green)';
    } else if (/true|false/.test(match)) cls = 'color:var(--yellow)';
    else if (/null/.test(match)) cls = 'color:var(--muted)';
    else cls = 'color:var(--orange)';
    return `<span style="${cls}">${esc(match)}</span>`;
  });
}

function esc(str) {
  if (str === undefined || str === null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── App Logic ────────────────────────────────────────────────────────────────
let lastParsed = null;

function doParse() {
  const raw = document.getElementById('hl7-input').value;
  const trimmed = raw.trim();

  // ── FHIR detection ──────────────────────────────────────────────────────────
  const fhirKind = detectFHIR(trimmed);
  if (fhirKind) {
    showFHIROutput();
    document.getElementById('msg-type-display').style.display = 'none';
    try {
      let resource, versionLabel;
      if (fhirKind === 'json') {
        resource = JSON.parse(trimmed);
        versionLabel = 'FHIR R4 JSON';
      } else {
        resource = parseFHIRXML(trimmed);
        versionLabel = 'FHIR R4 XML';
      }
      renderFHIR(resource, versionLabel);
    } catch (e) {
      const panel = document.getElementById('fhir-panel');
      panel.innerHTML = `<div class="error-panel" style="margin:20px">FHIR parse error: ${esc(e.message)}</div>`;
      panel.style.display = 'flex';
    }
    return;
  }

  // ── HL7 v2.x path ──────────────────────────────────────────────────────────
  restoreHL7Panels();
  const structuredContainer = document.getElementById('output-structured');
  const rawContainer = document.getElementById('output-raw');
  const jsonContainer = document.getElementById('output-json');

  try {
    const parsed = parseHL7(raw);
    lastParsed = parsed;

    renderStructured(parsed);
    renderHighlighted(parsed);
    renderJSON(parsed);

    // Update message type badge
    const badge = document.getElementById('msg-type-display');
    if (parsed.summary.msgType) {
      badge.textContent = parsed.summary.msgType;
      badge.style.display = '';
      badge.style.background = 'var(--surface2)';
      badge.style.color = 'var(--accent)';
      badge.style.border = '1px solid var(--border)';
    } else {
      badge.style.display = 'none';
    }
  } catch (e) {
    structuredContainer.innerHTML = `<div class="error-panel">Parse error: ${esc(e.message)}</div>`;
    rawContainer.innerHTML = '';
    jsonContainer.textContent = '';
    document.getElementById('msg-type-display').style.display = 'none';
  }
}

// Auto-parse on input with debounce
let debounceTimer = null;
document.getElementById('hl7-input').addEventListener('input', () => {
  const val = document.getElementById('hl7-input').value;
  document.getElementById('char-count').textContent = `${val.length} char${val.length !== 1 ? 's' : ''}`;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(doParse, 350);
});

// ─── FHIR Detection ──────────────────────────────────────────────────────────
function detectFHIR(text) {
  const t = text.trim();
  if (t.startsWith('{') && t.includes('"resourceType"')) return 'json';
  if (t.startsWith('<') && t.includes('hl7.org/fhir')) return 'xml';
  return null;
}

// ─── XML → JS Object conversion ─────────────────────────────────────────────
function xmlNodeToObj(node) {
  if (node.nodeType === Node.TEXT_NODE) {
    const t = node.textContent.trim();
    return t.length ? t : null;
  }
  if (node.nodeType !== Node.ELEMENT_NODE) return null;

  const obj = {};

  // Attributes
  for (const attr of node.attributes) {
    obj['@' + attr.name] = attr.value;
  }

  const children = Array.from(node.childNodes).filter(n =>
    n.nodeType === Node.ELEMENT_NODE ||
    (n.nodeType === Node.TEXT_NODE && n.textContent.trim().length > 0)
  );

  if (children.length === 0) {
    // Leaf: use @value attribute if present, else text content
    if (obj['@value'] !== undefined) return obj['@value'];
    const txt = node.textContent.trim();
    return txt.length ? txt : null;
  }

  // Children
  const childCounts = {};
  for (const ch of children) {
    if (ch.nodeType === Node.ELEMENT_NODE) {
      childCounts[ch.localName] = (childCounts[ch.localName] || 0) + 1;
    }
  }

  const childObjs = {};
  for (const ch of children) {
    if (ch.nodeType === Node.TEXT_NODE) {
      const t = ch.textContent.trim();
      if (t) obj['_text'] = t;
      continue;
    }
    const key = ch.localName;
    const val = xmlNodeToObj(ch);
    if (childCounts[key] > 1) {
      if (!childObjs[key]) childObjs[key] = [];
      childObjs[key].push(val);
    } else {
      childObjs[key] = val;
    }
  }

  return Object.assign(obj, childObjs);
}

function parseFHIRXML(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'application/xml');
  const parseError = doc.querySelector('parsererror');
  if (parseError) throw new Error('XML parse error: ' + parseError.textContent.slice(0, 120));
  const root = doc.documentElement;
  const obj = xmlNodeToObj(root);
  // Ensure resourceType is set from element name
  if (typeof obj === 'object' && !obj.resourceType) {
    obj.resourceType = root.localName;
  }
  return obj;
}

// ─── FHIR Rendering helpers ──────────────────────────────────────────────────
function fhirCard(label, value) {
  const card = document.createElement('div');
  card.className = 'fhir-card';
  const lbl = document.createElement('div');
  lbl.className = 'card-label';
  lbl.textContent = label;
  const val = document.createElement('div');
  val.className = 'card-value';
  if (value === null || value === undefined || value === '') {
    val.innerHTML = '<span class="fhir-empty">—</span>';
  } else {
    val.textContent = String(value);
  }
  card.appendChild(lbl);
  card.appendChild(val);
  return card;
}

function fhirSection(title) {
  const sec = document.createElement('div');
  sec.className = 'fhir-section';
  const hdr = document.createElement('div');
  hdr.className = 'fhir-section-title';
  hdr.textContent = title;
  sec.appendChild(hdr);
  return sec;
}

function safeGet(obj, ...path) {
  let cur = obj;
  for (const k of path) {
    if (cur === null || cur === undefined) return undefined;
    if (typeof k === 'number') cur = Array.isArray(cur) ? cur[k] : undefined;
    else cur = cur[k];
  }
  return cur;
}

function firstOf(...vals) {
  for (const v of vals) {
    if (v !== null && v !== undefined && v !== '') return v;
  }
  return null;
}

function fmtDate(iso) {
  if (!iso) return null;
  try {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return iso;
    return d.toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short' });
  } catch { return iso; }
}

function fmtDateOnly(iso) {
  if (!iso) return null;
  if (/^\d{4}-\d{2}-\d{2}$/.test(iso)) return iso;
  return fmtDate(iso);
}

// ─── Resource-type field extractors ─────────────────────────────────────────
function extractFields(resource) {
  const rt = resource.resourceType;
  const cards = [];

  function add(label, value) { cards.push([label, value]); }

  if (rt === 'Patient') {
    const officialName = (resource.name || []).find(n => n.use === 'official') || resource.name?.[0];
    const fullName = officialName
      ? [officialName.family, ...(officialName.given || [])].filter(Boolean).join(', ')
      : null;
    add('Name', fullName);
    add('Birth Date', fmtDateOnly(resource.birthDate));
    add('Gender', resource.gender);
    add('MRN / Identifier', safeGet(resource, 'identifier', 0, 'value'));
    const addr = resource.address?.[0];
    if (addr) {
      add('Address', [[...(addr.line || [])].join(', '), addr.city, addr.state, addr.postalCode].filter(Boolean).join(', '));
    } else {
      add('Address', null);
    }
    const phone = (resource.telecom || []).find(t => t.system === 'phone');
    add('Phone', phone?.value ?? null);
    add('Marital Status', firstOf(
      safeGet(resource, 'maritalStatus', 'text'),
      safeGet(resource, 'maritalStatus', 'coding', 0, 'display'),
      safeGet(resource, 'maritalStatus', 'coding', 0, 'code')
    ));
    const deceased = resource.deceasedBoolean !== undefined
      ? String(resource.deceasedBoolean)
      : (resource.deceasedDateTime ? fmtDate(resource.deceasedDateTime) : null);
    add('Deceased', deceased);

  } else if (rt === 'Observation') {
    add('Status', resource.status);
    add('Code', firstOf(
      safeGet(resource, 'code', 'text'),
      safeGet(resource, 'code', 'coding', 0, 'display')
    ));
    add('Code System', safeGet(resource, 'code', 'coding', 0, 'system'));
    add('Subject', safeGet(resource, 'subject', 'reference'));
    add('Effective', fmtDate(resource.effectiveDateTime || safeGet(resource, 'effectivePeriod', 'start')));
    const vq = resource.valueQuantity;
    add('Value', vq ? `${vq.value} ${vq.unit || ''}`.trim() : firstOf(resource.valueString, safeGet(resource, 'valueCodeableConcept', 'text')));
    add('Interpretation', safeGet(resource, 'interpretation', 0, 'coding', 0, 'code'));
    const rr = resource.referenceRange?.[0];
    if (rr) {
      const lo = rr.low ? `${rr.low.value} ${rr.low.unit || ''}`.trim() : '';
      const hi = rr.high ? `${rr.high.value} ${rr.high.unit || ''}`.trim() : '';
      add('Reference Range', lo && hi ? `${lo} – ${hi}` : lo || hi || null);
    } else {
      add('Reference Range', null);
    }

  } else if (rt === 'DiagnosticReport') {
    add('Status', resource.status);
    add('Code', firstOf(safeGet(resource, 'code', 'text'), safeGet(resource, 'code', 'coding', 0, 'display')));
    add('Subject', safeGet(resource, 'subject', 'reference'));
    add('Effective', fmtDate(resource.effectiveDateTime));
    add('Issued', fmtDate(resource.issued));
    const results = (resource.result || []).map(r => r.display || r.reference).filter(Boolean).join('; ');
    add('Results', results || null);
    add('Conclusion', resource.conclusion);

  } else if (rt === 'Encounter') {
    add('Status', resource.status);
    add('Class', firstOf(safeGet(resource, 'class', 'display'), safeGet(resource, 'class', 'code')));
    add('Type', safeGet(resource, 'type', 0, 'text'));
    add('Subject', safeGet(resource, 'subject', 'reference'));
    add('Period Start', fmtDate(safeGet(resource, 'period', 'start')));
    add('Period End', fmtDate(safeGet(resource, 'period', 'end')));
    add('Reason', safeGet(resource, 'reasonCode', 0, 'text'));
    add('Admit Source', safeGet(resource, 'hospitalization', 'admitSource', 'text'));
    add('Discharge Disposition', safeGet(resource, 'hospitalization', 'dischargeDisposition', 'text'));

  } else if (rt === 'Condition') {
    add('Clinical Status', safeGet(resource, 'clinicalStatus', 'coding', 0, 'code'));
    add('Verification Status', safeGet(resource, 'verificationStatus', 'coding', 0, 'code'));
    add('Code', firstOf(safeGet(resource, 'code', 'text'), safeGet(resource, 'code', 'coding', 0, 'display')));
    add('Subject', safeGet(resource, 'subject', 'reference'));
    add('Onset', fmtDate(resource.onsetDateTime));
    add('Recorded', fmtDate(resource.recordedDate));
    add('Note', safeGet(resource, 'note', 0, 'text'));

  } else if (rt === 'MedicationRequest') {
    add('Status', resource.status);
    add('Intent', resource.intent);
    add('Medication', firstOf(
      safeGet(resource, 'medicationCodeableConcept', 'text'),
      safeGet(resource, 'medicationCodeableConcept', 'coding', 0, 'display'),
      safeGet(resource, 'medicationReference', 'display')
    ));
    add('Subject', safeGet(resource, 'subject', 'reference'));
    add('Authored On', fmtDate(resource.authoredOn));
    add('Dosage Instructions', safeGet(resource, 'dosageInstruction', 0, 'text'));
    const dq = safeGet(resource, 'dosageInstruction', 0, 'doseAndRate', 0, 'doseQuantity');
    add('Dose', dq ? `${dq.value} ${dq.unit || ''}`.trim() : null);

  } else if (rt === 'Procedure') {
    add('Status', resource.status);
    add('Code', firstOf(safeGet(resource, 'code', 'text'), safeGet(resource, 'code', 'coding', 0, 'display')));
    add('Subject', safeGet(resource, 'subject', 'reference'));
    add('Performed', fmtDate(resource.performedDateTime || safeGet(resource, 'performedPeriod', 'start')));
    add('Outcome', safeGet(resource, 'outcome', 'text'));
    add('Note', safeGet(resource, 'note', 0, 'text'));

  } else if (rt === 'AllergyIntolerance') {
    add('Clinical Status', safeGet(resource, 'clinicalStatus', 'coding', 0, 'code'));
    add('Verification Status', safeGet(resource, 'verificationStatus', 'coding', 0, 'code'));
    add('Type', resource.type);
    add('Category', resource.category?.[0] ?? null);
    add('Code', firstOf(safeGet(resource, 'code', 'text'), safeGet(resource, 'code', 'coding', 0, 'display')));
    add('Patient', safeGet(resource, 'patient', 'reference'));
    add('Manifestation', safeGet(resource, 'reaction', 0, 'manifestation', 0, 'text'));
    add('Severity', safeGet(resource, 'reaction', 0, 'severity'));

  } else if (rt === 'Immunization') {
    add('Status', resource.status);
    add('Vaccine', firstOf(safeGet(resource, 'vaccineCode', 'text'), safeGet(resource, 'vaccineCode', 'coding', 0, 'display')));
    add('Patient', safeGet(resource, 'patient', 'reference'));
    add('Occurrence', fmtDate(resource.occurrenceDateTime));
    add('Lot Number', resource.lotNumber);
    add('Site', safeGet(resource, 'site', 'text'));
    add('Route', safeGet(resource, 'route', 'text'));

  } else {
    // Generic: all top-level scalars
    for (const [k, v] of Object.entries(resource)) {
      if (k === 'resourceType') continue;
      if (typeof v === 'string' || typeof v === 'number' || typeof v === 'boolean') {
        add(k, String(v));
      }
    }
  }

  return cards;
}

// ─── FHIR Panel renderer ─────────────────────────────────────────────────────
function renderFHIR(resource, fhirVersion) {
  const panel = document.getElementById('fhir-panel');
  panel.innerHTML = '';
  panel.style.display = 'flex';

  // 1. Header bar
  const header = document.createElement('div');
  header.className = 'fhir-header';

  const badge = document.createElement('span');
  badge.className = 'fhir-badge';
  badge.textContent = resource.resourceType || 'Resource';
  header.appendChild(badge);

  if (resource.id) {
    const idSpan = document.createElement('span');
    idSpan.className = 'fhir-header-id';
    idSpan.innerHTML = 'ID: <strong>' + esc(resource.id) + '</strong>';
    header.appendChild(idSpan);
  }

  const lastUpdated = safeGet(resource, 'meta', 'lastUpdated');
  if (lastUpdated) {
    const dateSpan = document.createElement('span');
    dateSpan.className = 'fhir-header-date';
    dateSpan.textContent = 'Updated: ' + fmtDate(lastUpdated);
    header.appendChild(dateSpan);
  }

  const vLabel = document.createElement('span');
  vLabel.className = 'fhir-version-label';
  vLabel.textContent = fhirVersion;
  header.appendChild(vLabel);

  panel.appendChild(header);

  // 2. Key clinical fields
  const rt = resource.resourceType;
  const fields = extractFields(resource);
  const isGeneric = !['Patient','Observation','DiagnosticReport','Encounter','Condition',
    'MedicationRequest','Procedure','AllergyIntolerance','Immunization'].includes(rt);

  const clinicSec = fhirSection('Key Fields');
  const cardsDiv = document.createElement('div');
  cardsDiv.className = isGeneric ? 'fhir-scalar-grid' : 'fhir-cards';
  const body = document.createElement('div');
  body.className = 'fhir-section-body';
  for (const [label, val] of fields) {
    cardsDiv.appendChild(fhirCard(label, val));
  }
  body.appendChild(cardsDiv);
  clinicSec.appendChild(body);
  panel.appendChild(clinicSec);

  // For unknown resource types: also show raw JSON viewer inline (skip separate raw)
  if (isGeneric) {
    const note = document.createElement('p');
    note.style.cssText = 'font-size:12px;color:var(--muted);padding:0 14px 10px;font-style:italic;';
    note.textContent = 'Showing all top-level scalar fields. See raw viewer below for full resource.';
    body.appendChild(note);
  }

  // 3. Identifiers section
  if (Array.isArray(resource.identifier) && resource.identifier.length > 0) {
    const idSec = fhirSection('Identifiers');
    const idBody = document.createElement('div');
    idBody.className = 'fhir-section-body';
    const tbl = document.createElement('table');
    tbl.className = 'fhir-id-table';
    tbl.innerHTML = '<thead><tr><th>System</th><th>Value</th><th>Use</th></tr></thead>';
    const tbody = document.createElement('tbody');
    for (const id of resource.identifier) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="fhir-id-system">${esc(id.system || '—')}</td><td>${esc(id.value || '—')}</td><td>${esc(id.use || '—')}</td>`;
      tbody.appendChild(tr);
    }
    tbl.appendChild(tbody);
    idBody.appendChild(tbl);
    idSec.appendChild(idBody);
    panel.appendChild(idSec);
  }

  // 4. Raw viewer
  const rawSec = document.createElement('div');
  rawSec.className = 'fhir-section fhir-raw';
  const details = document.createElement('details');
  const summary = document.createElement('summary');
  summary.textContent = 'Raw Resource (JSON)';
  details.appendChild(summary);
  const pre = document.createElement('pre');
  const jsonStr = JSON.stringify(resource, null, 2);
  pre.innerHTML = fhirSyntaxHighlight(jsonStr);
  details.appendChild(pre);
  rawSec.appendChild(details);
  panel.appendChild(rawSec);
}

function fhirSyntaxHighlight(json) {
  // Resource values may contain HTML — escape every emitted piece so nothing injects markup.
  return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)|[<>&]/g, match => {
    if (match === '<' || match === '>' || match === '&') return esc(match);
    let color;
    if (/^"/.test(match)) {
      if (/:$/.test(match)) color = 'var(--accent)'; // key → cyan
      else color = 'var(--yellow)';                  // string → yellow
    } else if (/true|false/.test(match)) color = 'var(--accent2)'; // boolean → purple
    else if (/null/.test(match)) color = 'var(--red)';         // null → red
    else color = 'var(--accent2)';                                  // number → purple
    return `<span style="color:${color}">${esc(match)}</span>`;
  });
}

// ─── Show/hide helpers ───────────────────────────────────────────────────────
function showFHIROutput() {
  // Keep the main-grid (input panel) visible, hide right-side output panel only
  // We do this by hiding the right panel (second child of main-grid) and showing fhir-panel
  const panels = document.querySelectorAll('.main-grid > .panel');
  // panels[0] = left input, panels[1] = right output
  if (panels[1]) panels[1].style.display = 'none';
  document.getElementById('fhir-panel').style.display = 'flex';
}

function restoreHL7Panels() {
  const panels = document.querySelectorAll('.main-grid > .panel');
  if (panels[1]) panels[1].style.display = '';
  document.getElementById('fhir-panel').style.display = 'none';
}
