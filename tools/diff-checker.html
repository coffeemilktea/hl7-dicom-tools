<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HL7 Diff Checker</title>
  <link rel="stylesheet" href="theme.css" />
  <script src="theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --row-diff-bg: rgba(230, 219, 116, 0.08);
      --row-diff-border: rgba(230, 219, 116, 0.3);
      --row-miss-bg: rgba(249, 38, 114, 0.08);
      --row-miss-border: rgba(249, 38, 114, 0.3);
      --cell-miss-bg: rgba(249, 38, 114, 0.15);
      --cell-present-bg: rgba(166, 226, 46, 0.12);
    }

    /* ── Light mode overrides for hl7-diff ── */
    [data-theme="light"] {
      --row-diff-bg:    rgba(134,110,0,0.07);
      --row-diff-border:rgba(134,110,0,0.25);
      --row-miss-bg:    rgba(212,0,110,0.06);
      --row-miss-border:rgba(212,0,110,0.25);
      --cell-miss-bg:   rgba(212,0,110,0.10);
      --cell-present-bg:rgba(92,132,0,0.10);
    }
    [data-theme="light"] .segment-block { background: var(--surface); border-color: var(--border); }
    [data-theme="light"] .seg-header { background: var(--surface2); border-bottom-color: var(--border); }
    [data-theme="light"] .seg-name { color: var(--accent); }
    [data-theme="light"] thead th { background: var(--bg); }
    [data-theme="light"] td { border-bottom-color: rgba(214,213,204,0.5); }
    [data-theme="light"] .seg-absent { color: var(--muted); }
    [data-theme="light"] textarea { background: var(--surface); color: var(--text); border-color: var(--border); }
    [data-theme="light"] textarea:focus { border-color: var(--accent); }
    [data-theme="light"] .btn-primary { background: var(--accent); }
    [data-theme="light"] .btn-secondary { background: var(--surface2); color: var(--text); border-color: var(--border); }
    [data-theme="light"] .stat { background: var(--surface); border-color: var(--border); }
    [data-theme="light"] .stat-value.c-blue { color: var(--accent); }
    [data-theme="light"] .stat-value.c-green { color: var(--green); }
    [data-theme="light"] .stat-value.c-yellow { color: var(--yellow); }
    [data-theme="light"] .stat-value.c-red { color: var(--red); }
    [data-theme="light"] .toggle { color: var(--muted); }
    [data-theme="light"] .toggle:hover { color: var(--text); }
    [data-theme="light"] .seg-ok     { background: rgba(92,132,0,.12);    color: var(--green); }
    [data-theme="light"] .seg-diff   { background: rgba(134,110,0,.12);   color: var(--yellow); }
    [data-theme="light"] .seg-only-a { background: rgba(5,151,167,.10);   color: var(--accent); }
    [data-theme="light"] .seg-only-b { background: rgba(201,105,0,.12);   color: var(--orange); }
    [data-theme="light"] .seg-missing{ background: rgba(212,0,110,.10);   color: var(--red); }
    [data-theme="light"] .cell-missing { background: rgba(212,0,110,0.08); color: var(--red); }
    [data-theme="light"] .row-diff { background: var(--row-diff-bg); }
    [data-theme="light"] .row-miss  { background: var(--row-miss-bg); }
    [data-theme="light"] .header-icon { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    .header-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #66d9ef, #ae81ff);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
    header p  { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

    /* ── Main layout ── */
    .main { max-width: 1500px; margin: 0 auto; padding: 24px; }

    /* ── Input section ── */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .input-panel {}

    .panel-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .panel-label .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .dot-a { background: var(--accent); }
    .dot-b { background: var(--orange); }

    textarea {
      width: 100%;
      height: 180px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      line-height: 1.5;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* ── Controls ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 9px 22px;
      border: none; border-radius: 6px;
      font-size: 0.875rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s, transform .1s;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn:hover { opacity: .85; }

    .divider { width: 1px; height: 24px; background: var(--border); }

    .toggle {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.82rem; color: var(--muted); cursor: pointer;
      user-select: none;
    }
    .toggle input[type=checkbox] { accent-color: var(--accent); cursor: pointer; width: 14px; height: 14px; }
    .toggle:hover { color: var(--text); }

    /* ── Summary ── */
    .summary {
      display: flex; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 20px;
      text-align: center;
      min-width: 110px;
    }
    .stat-value { font-size: 1.6rem; font-weight: 800; font-family: var(--font-mono); }
    .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
    .stat-value.c-green { color: var(--green); }
    .stat-value.c-yellow { color: var(--yellow); }
    .stat-value.c-red { color: var(--red); }
    .stat-value.c-blue { color: var(--accent); }

    /* ── Segment blocks ── */
    .segment-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .seg-header {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-mono);
      font-size: 0.85rem;
    }

    .seg-name {
      font-weight: 700; font-size: 0.95rem;
      color: var(--accent);
    }

    .seg-occurrence {
      font-size: 0.7rem; color: var(--muted);
      background: var(--bg);
      padding: 2px 7px; border-radius: 4px;
      border: 1px solid var(--border);
    }

    .seg-status {
      margin-left: auto;
      font-size: 0.7rem; font-weight: 700;
      padding: 3px 10px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: .06em;
      font-family: var(--font-sans);
    }
    .seg-ok     { background: rgba(166,226,46,.15); color: var(--green); }
    .seg-diff   { background: rgba(230,219,116,.15);  color: var(--yellow); }
    .seg-only-a { background: rgba(102,217,239,.15);  color: var(--accent); }
    .seg-only-b { background: rgba(253,151,31,.15);  color: var(--orange); }
    .seg-missing { background: rgba(249,38,114,.15);  color: var(--red); }

    /* ── Field table ── */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }

    thead th {
      padding: 7px 12px;
      background: var(--bg);
      font-size: 0.7rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    thead th:first-child { width: 200px; }
    thead th:nth-child(2), thead th:nth-child(3) { width: calc((100% - 200px) / 2); }

    td {
      padding: 6px 12px;
      border-bottom: 1px solid rgba(73,72,62,.5);
      font-family: var(--font-mono);
      font-size: 0.78rem;
      vertical-align: top;
      word-break: break-all;
      line-height: 1.5;
    }
    tr:last-child td { border-bottom: none; }

    td.field-label {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      color: var(--muted);
    }
    td.field-label .field-id {
      font-family: var(--font-mono);
      font-weight: 700;
      color: var(--text);
      font-size: 0.75rem;
    }
    td.field-label .field-name {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 1px;
    }

    /* Row states */
    tr.row-same   { }
    tr.row-diff   { background: var(--row-diff-bg); }
    tr.row-diff td { border-bottom-color: var(--row-diff-border); }

    tr.row-miss   { background: var(--row-miss-bg); }
    tr.row-miss td { border-bottom-color: var(--row-miss-border); }

    /* Cell states */
    td.cell-missing {
      background: var(--cell-miss-bg);
      color: var(--red);
    }
    td.cell-missing::after {
      content: '— missing';
      font-size: 0.68rem;
      opacity: .6;
      display: block;
    }
    td.cell-present-only {
      color: var(--green);
    }
    td.cell-diff-a { color: var(--yellow); }
    td.cell-diff-b { color: var(--orange); }

    /* Absent segment placeholder */
    .seg-absent {
      padding: 16px 14px;
      color: var(--muted);
      font-size: 0.82rem;
      font-style: italic;
      display: flex; align-items: center; gap: 8px;
    }
    .seg-absent::before { content: '—'; font-size: 1.2rem; }

    /* Empty state */
    #results:empty::after {
      content: 'Paste two HL7 messages above and click Compare.';
      display: block;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 48px;
    }

    .error-msg {
      background: rgba(245,95,95,.1);
      border: 1px solid rgba(245,95,95,.3);
      border-radius: var(--radius);
      color: var(--red);
      padding: 12px 16px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }

    /* Legend */
    .legend {
      display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
      margin-bottom: 16px;
      font-size: 0.75rem; color: var(--muted);
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
    }
  </style>
</head>

<header class="app-header">
  <div class="header-icon">⇄</div>
  <div>
    <h1>HL7 Diff Checker</h1>
    <p>Side-by-side HL7 v2.x message comparison</p>
  </div>
  <div class="nav-links" style="margin-left:auto;">
    <a href="msgparser.html">HL7 Parser</a>
    <a href="dicom-viewer.html">DICOM Viewer</a>
    <a href="dicom-generator.html">DICOM Gen</a>
    <a href="mwl-simulator.html">MWL Sim</a>
    <a href="dicom-hl7-order.html">DICOM→HL7</a>
  </div>
  <button class="btn-theme" id="btn-theme">
    <span class="theme-icon">☀️</span>
    <span class="theme-label">Light</span>
  </button>
</header>

<div class="main">
  <div class="input-grid">
    <div class="input-panel">
      <div class="panel-label"><span class="dot dot-a"></span> Message A</div>
      <textarea id="msgA" placeholder="MSH|^~\&|SendingApp|SendingFac|RecvApp|RecvFac|..."></textarea>
    </div>
    <div class="input-panel">
      <div class="panel-label"><span class="dot dot-b"></span> Message B</div>
      <textarea id="msgB" placeholder="MSH|^~\&|SendingApp|SendingFac|RecvApp|RecvFac|..."></textarea>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="compare()">Compare</button>
    <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
    <div class="divider"></div>
    <label class="toggle">
      <input type="checkbox" id="showSame" onchange="rerender()">
      Show identical fields
    </label>
    <label class="toggle">
      <input type="checkbox" id="showBothEmpty" onchange="rerender()">
      Show fields empty in both
    </label>
  </div>

  <div id="summary" class="summary" style="display:none"></div>
  <div id="legend"  class="legend"  style="display:none">
    <span>Legend:</span>
    <span class="legend-item"><span class="legend-dot" style="background:rgba(166,226,46,.4)"></span> Identical</span>
    <span class="legend-item"><span class="legend-dot" style="background:rgba(230,219,116,.4)"></span> Different value</span>
    <span class="legend-item"><span class="legend-dot" style="background:rgba(249,38,114,.4)"></span> Missing in one message</span>
    <span class="legend-item"><span class="legend-dot" style="background:rgba(102,217,239,.4)"></span> Segment only in A</span>
    <span class="legend-item"><span class="legend-dot" style="background:rgba(253,151,31,.4)"></span> Segment only in B</span>
  </div>
  <div id="results"></div>
</div>

/* ─────────────────────────────────────────────
   Parse HL7 text → array of segment objects
   { name, fields[], raw }
   fields[0] = segment name, fields[N] = field N (1-indexed)
───────────────────────────────────────────── */
function parseHL7(text) {
  const lines = text.split(/\r?\n|\r/).map(l => l.trim()).filter(Boolean);
  if (!lines.length) return [];

  const segments = [];
  // Detect field separator from MSH
  let fieldSep = '|';
  for (const l of lines) {
    if (l.startsWith('MSH') && l.length > 3) { fieldSep = l[3]; break; }
  }

  for (const line of lines) {
    const segName = line.substring(0, 3);
    let parts = line.split(fieldSep);
    // MSH: insert "|" as field 1 so that parts[N] === MSH.N for N>=1
    if (segName === 'MSH') {
      parts.splice(1, 0, fieldSep);
    }
    segments.push({ name: segName, fields: parts, raw: line });
  }
  return segments;
}

/* ─────────────────────────────────────────────
   Group segments by name, return map: name → [seg, seg, ...]
───────────────────────────────────────────── */
function groupByName(segments) {
  const map = {};
  for (const seg of segments) {
    if (!map[seg.name]) map[seg.name] = [];
    map[seg.name].push(seg);
  }
  return map;
}

/* ─────────────────────────────────────────────
   Build comparison pairs preserving message order
───────────────────────────────────────────── */
function buildPairs(segsA, segsB) {
  const groupA = groupByName(segsA);
  const groupB = groupByName(segsB);

  // Build ordered list of segment names from both messages
  const seen = new Set();
  const orderedKeys = [];

  // Walk message A order first, then add B-only segments
  for (const seg of segsA) {
    if (!seen.has(seg.name)) { seen.add(seg.name); orderedKeys.push(seg.name); }
  }
  for (const seg of segsB) {
    if (!orderedKeys.includes(seg.name)) orderedKeys.push(seg.name);
  }

  const pairs = [];
  for (const name of orderedKeys) {
    const listA = groupA[name] || [];
    const listB = groupB[name] || [];
    const maxLen = Math.max(listA.length, listB.length);
    for (let i = 0; i < maxLen; i++) {
      pairs.push({
        name,
        occurrence: i + 1,
        totalA: listA.length,
        totalB: listB.length,
        segA: listA[i] || null,
        segB: listB[i] || null,
      });
    }
  }
  return pairs;
}

/* ─────────────────────────────────────────────
   Diff a single pair of segments field by field
   Returns array of field diff objects
───────────────────────────────────────────── */
function diffSegments(segA, segB, segName) {
  const fieldsA = segA ? segA.fields : [];
  const fieldsB = segB ? segB.fields : [];
  const maxLen = Math.max(fieldsA.length, fieldsB.length);
  const diffs = [];
  const names = FIELD_NAMES[segName] || [];

  for (let i = 1; i < maxLen; i++) {  // skip index 0 (segment name)
    const a = (fieldsA[i] !== undefined) ? fieldsA[i] : '';
    const b = (fieldsB[i] !== undefined) ? fieldsB[i] : '';
    const fieldName = names[i] || '';

    let status;
    if (a === b)            status = 'same';
    else if (!a && b)       status = 'miss-a';  // A missing, B has value
    else if (a && !b)       status = 'miss-b';  // B missing, A has value
    else                    status = 'diff';

    diffs.push({ fieldNum: i, fieldName, a, b, status });
  }
  return diffs;
}

/* ─────────────────────────────────────────────
   Global comparison result (for rerender)
───────────────────────────────────────────── */
let lastPairs = null;

function compare() {
  const textA = document.getElementById('msgA').value.trim();
  const textB = document.getElementById('msgB').value.trim();
  const results = document.getElementById('results');
  const summary = document.getElementById('summary');
  const legend  = document.getElementById('legend');

  results.innerHTML = '';
  summary.style.display = 'none';
  legend.style.display  = 'none';

  if (!textA && !textB) {
    results.innerHTML = '';
    lastPairs = null;
    return;
  }
  if (!textA || !textB) {
    results.innerHTML = `<div class="error-msg">Please paste an HL7 message in both panels.</div>`;
    lastPairs = null;
    return;
  }

  const segsA = parseHL7(textA);
  const segsB = parseHL7(textB);

  if (!segsA.length || !segsB.length) {
    results.innerHTML = `<div class="error-msg">Could not parse one or both messages. Ensure they are valid HL7 v2.x.</div>`;
    lastPairs = null;
    return;
  }

  lastPairs = buildPairs(segsA, segsB);
  rerender();
}

function rerender() {
  if (!lastPairs) return;
  const showSame      = document.getElementById('showSame').checked;
  const showBothEmpty = document.getElementById('showBothEmpty').checked;
  const results = document.getElementById('results');
  const summary = document.getElementById('summary');
  const legend  = document.getElementById('legend');

  let totalSame = 0, totalDiff = 0, totalMissA = 0, totalMissB = 0;
  let totalSegsA = 0, totalSegsB = 0;

  const html = [];

  for (const pair of lastPairs) {
    const { name, occurrence, segA, segB } = pair;
    const totalOccurrences = Math.max(pair.totalA, pair.totalB);
    const showOcc = totalOccurrences > 1;

    // Segment-level status
    let segStatus, segStatusLabel;
    if (!segA) {
      segStatus = 'seg-only-b'; segStatusLabel = 'Only in B';
      totalSegsB++;
    } else if (!segB) {
      segStatus = 'seg-only-a'; segStatusLabel = 'Only in A';
      totalSegsA++;
    } else {
      segStatus = null; // determined after field diff
    }

    const diffs = diffSegments(segA, segB, name);

    // Count field statuses
    let hasAny = false;
    for (const d of diffs) {
      if (d.status === 'same')   totalSame++;
      if (d.status === 'diff')   { totalDiff++;  hasAny = true; }
      if (d.status === 'miss-a') { totalMissA++; hasAny = true; }
      if (d.status === 'miss-b') { totalMissB++; hasAny = true; }
    }

    if (!segA || !segB) hasAny = true;

    if (!segStatus) {
      if (!hasAny) { segStatus = 'seg-ok'; segStatusLabel = 'Identical'; }
      else         { segStatus = 'seg-diff'; segStatusLabel = 'Differences'; }
    }

    html.push(`<div class="segment-block">`);
    html.push(`<div class="seg-header">`);
    html.push(`<span class="seg-name">${esc(name)}</span>`);
    if (showOcc) html.push(`<span class="seg-occurrence">occurrence ${occurrence}</span>`);
    html.push(`<span class="seg-status ${segStatus}">${segStatusLabel}</span>`);
    html.push(`</div>`); // seg-header

    if (!segA || !segB) {
      // Entire segment absent from one side
      const presentMsg = segA ? 'A' : 'B';
      const absentMsg  = segA ? 'B' : 'A';
      html.push(`<table>`);
      html.push(`<thead><tr>
        <th>Field</th>
        <th><span class="dot dot-a" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:6px;"></span>Message A</th>
        <th><span class="dot dot-b" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--orange);margin-right:6px;"></span>Message B</th>
      </tr></thead><tbody>`);

      for (const d of diffs) {
        const onlyVal = segA ? d.a : d.b;
        if (!onlyVal && !showBothEmpty) continue;
        const cellA = segA ? `<td class="cell-present-only">${esc(d.a)||'<span style="opacity:.3">—</span>'}</td>` : `<td class="cell-missing"></td>`;
        const cellB = segB ? `<td class="cell-present-only">${esc(d.b)||'<span style="opacity:.3">—</span>'}</td>` : `<td class="cell-missing"></td>`;
        html.push(`<tr class="row-miss">
          <td class="field-label"><span class="field-id">${esc(name)}.${d.fieldNum}</span>${d.fieldName ? `<div class="field-name">${esc(d.fieldName)}</div>` : ''}</td>
          ${cellA}${cellB}
        </tr>`);
      }
      html.push(`</tbody></table>`);
    } else {
      // Both segments present — field-level diff
      const filteredDiffs = diffs.filter(d => {
        if (d.status === 'same' && !d.a && !d.b && !showBothEmpty) return false;
        if (d.status === 'same' && !showSame) return false;
        return true;
      });

      if (filteredDiffs.length === 0) {
        html.push(`<div class="seg-absent">All fields identical${!showSame ? ' — enable "Show identical fields" to view' : ''}.</div>`);
      } else {
        html.push(`<table>`);
        html.push(`<thead><tr>
          <th>Field</th>
          <th><span class="dot dot-a" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:6px;"></span>Message A</th>
          <th><span class="dot dot-b" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--orange);margin-right:6px;"></span>Message B</th>
        </tr></thead><tbody>`);

        for (const d of filteredDiffs) {
          let rowClass = 'row-same';
          let cellClassA = '', cellClassB = '';

          if (d.status === 'diff') {
            rowClass = 'row-diff';
            cellClassA = 'cell-diff-a';
            cellClassB = 'cell-diff-b';
          } else if (d.status === 'miss-a') {
            rowClass = 'row-miss';
            cellClassA = 'cell-missing';
          } else if (d.status === 'miss-b') {
            rowClass = 'row-miss';
            cellClassB = 'cell-missing';
          }

          const valA = d.a ? esc(d.a) : (d.status === 'miss-a' ? '' : '<span style="opacity:.3">—</span>');
          const valB = d.b ? esc(d.b) : (d.status === 'miss-b' ? '' : '<span style="opacity:.3">—</span>');

          html.push(`<tr class="${rowClass}">
            <td class="field-label"><span class="field-id">${esc(name)}.${d.fieldNum}</span>${d.fieldName ? `<div class="field-name">${esc(d.fieldName)}</div>` : ''}</td>
            <td class="${cellClassA}">${valA}</td>
            <td class="${cellClassB}">${valB}</td>
          </tr>`);
        }

        html.push(`</tbody></table>`);
      }
    }

    html.push(`</div>`); // segment-block
  }

  results.innerHTML = html.join('');

  // Summary bar
  const totalFields = totalSame + totalDiff + totalMissA + totalMissB;
  summary.innerHTML = `
    <div class="stat"><div class="stat-value c-blue">${lastPairs.length}</div><div class="stat-label">Segments</div></div>
    <div class="stat"><div class="stat-value c-blue">${totalFields}</div><div class="stat-label">Fields Compared</div></div>
    <div class="stat"><div class="stat-value c-green">${totalSame}</div><div class="stat-label">Identical</div></div>
    <div class="stat"><div class="stat-value c-yellow">${totalDiff}</div><div class="stat-label">Different</div></div>
    <div class="stat"><div class="stat-value c-red">${totalMissA + totalMissB}</div><div class="stat-label">Missing</div></div>
    ${totalSegsA ? `<div class="stat"><div class="stat-value" style="color:var(--accent)">${totalSegsA}</div><div class="stat-label">Seg Only in A</div></div>` : ''}
    ${totalSegsB ? `<div class="stat"><div class="stat-value" style="color:var(--orange)">${totalSegsB}</div><div class="stat-label">Seg Only in B</div></div>` : ''}
  `;
  summary.style.display = 'flex';
  legend.style.display  = 'flex';
}

function clearAll() {
  document.getElementById('msgA').value = '';
  document.getElementById('msgB').value = '';
  document.getElementById('results').innerHTML = '';
  document.getElementById('summary').style.display = 'none';
  document.getElementById('legend').style.display  = 'none';
  lastPairs = null;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Allow Ctrl+Enter or Cmd+Enter to compare
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') compare();
});
</script>
</body>
</html>
