<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
    {% seo %}
  </head>

  <body>
    <header>
      <div class="container">
        <a href="{{ '/' | relative_url }}" class="site-title-link">
          <h1>{{ site.title | default: site.github.repository_name }}</h1>
        </a>
        <p class="site-tagline">{{ site.description | default: site.github.project_tagline }}</p>
        <nav class="site-nav">
          <a href="{{ site.github.repository_url }}" class="btn btn-github"><span class="icon"></span>View on GitHub</a>
        </nav>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>

    <footer class="site-footer">
      <div class="container">
        <p>All tools run entirely in your browser &mdash; no data is sent to external servers.</p>
        <p class="footer-links">
          <a href="{{ '/' | relative_url }}">Home</a>
          &middot;
          <a href="{{ site.github.repository_url }}">GitHub</a>
        </p>
      </div>
    </footer>
  </body>
</html>
