<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en-US' }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1a1b26">
    <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
    <!-- Shared theme controller: applies the saved theme before paint and wires #btn-theme -->
    <script src="{{ '/tools/theme.js' | relative_url }}"></script>
    {% seo %}
  </head>

  <body>
    <header>
      <div class="container header-top">
        <div>
          <a href="{{ '/' | relative_url }}" class="site-title-link">
            <h1>{{ site.title | default: site.github.repository_name }}</h1>
          </a>
          <p class="site-tagline">{{ site.description | default: site.github.project_tagline }}</p>
        </div>
        <nav class="site-nav">
          <a href="{{ site.github.repository_url }}" class="btn">View on GitHub</a>
          <button class="btn-theme" id="btn-theme" type="button">
            <span class="theme-icon">☀️</span>
            <span class="theme-label">Light</span>
          </button>
        </nav>
      </div>
    </header>

    <div class="container">
      <section id="main_content">
        {{ content }}
      </section>
    </div>

    <footer class="site-footer">
      <div class="container">
        <p>All tools run entirely in your browser &mdash; no data is sent to external servers.</p>
        <p class="footer-links">
          <a href="{{ '/' | relative_url }}">Home</a>
          &middot;
          <a href="{{ site.github.repository_url }}">GitHub</a>
        </p>
      </div>
    </footer>
  </body>
</html>
